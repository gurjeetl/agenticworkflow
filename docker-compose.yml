# Local infrastructure for the ASYNC A2A transport (Docker Desktop / WSL2).
#
#   docker compose up -d
#
# Redpanda is a Kafka-API-compatible single-binary broker — the local stand-in
# for the corporate Apache Kafka cluster (which is a pure config change: see
# docs/ASYNC_A2A_PLAN.md §11). Topics auto-create in dev; corporate clusters
# pre-provision them.
#
# The sync-only platform needs none of this (MongoDB alone suffices); Kafka +
# Redis are required only when KAFKA_ENABLED=true.
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:9092
    ports:
      - "9092:19092"   # host apps reach the broker at localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
