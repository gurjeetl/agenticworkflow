# Genie platform — canonical configuration (committed).
#
# This is the primary place to configure the platform. Values here are
# authoritative: they override environment variables of the same name. Secrets
# (API keys, tokens, DB passwords) must NOT go here — put them in the gitignored
# config/local.yaml (see config/local.yaml.example). config/local.yaml is layered
# on top of this file, so it can override any value below.
#
# Field reference: genie.platform.config.Settings.
#
# NOTE on precedence: environment variables / .env now OVERRIDE YAML (12-factor).
# A key set as an env var wins over the same key here; YAML is the baseline and
# overrides only the in-code field defaults.

# ── Runtime environment ───────────────────────────────────────────────────────
# "development" (default) | "production" | "staging". Set ENVIRONMENT=production in
# real deployments. In development, run_agent uses each agent's static default port
# (8010/8011/8012) for easy manual testing; outside development that default is
# suppressed (agents use an explicit AGENT_PORT/agent_port pin, or an ephemeral
# port advertised via the registry).
environment: development

# ── LLM (OpenAI-compatible) ───────────────────────────────────────────────────
# NOTE: a named backend is active below (llm_services.default), so openai_model is
# the inert fallback — used only if llm_services.default is unset/cleared.
openai_model: gpt-4o-mini
# Deterministic routing/planning/synthesis → less run-to-run variance, fewer
# spurious re-plans. Quoted so it stays a string ("" / unset = provider default).
openai_temperature: "0"
# Per-component model overrides (leave unset to fall back to openai_model):
# planner_model: gpt-4.1-nano
# synthesizer_model: gpt-4.1-nano
# router_model: gpt-4o-mini

# ── Pipeline toggles ──────────────────────────────────────────────────────────
# Set router_enabled: false to drop the Router triage node and send every prompt
# straight to the Planner (no fast-path / chitchat shortcut).
router_enabled: true

# ── MCP (the platform's tool-connection capability) ───────────────────────────
# Single MCP server agents connect to. For multiple named servers, use the
# mcp_services block below instead.
mcp_server_url: http://127.0.0.1:8001/sse
mcp_server_name: weather
mcp_transport: sse
mcp_timeout: 30.0

# Named MCP servers (alternative/addition to the single mcp_server_url above).
mcp_services: {}
#   travel:
#     url: http://127.0.0.1:8001/sse
#     transport: sse

# Named LLM backends (for OpenAI-compatible self-hosted models). `default` selects
# which model below is used for ALL LLM calls (router/planner/synthesizer/agents);
# base_url is derived as http://{host}:{port}/{prompting_path}.
llm_services:
  default: 
  models:
    gpt_oss:
      host: "genieapps4.dev.oati.local"
      port: 8033
      model_name: "openai/gpt-oss-120b"
      prompting_path: "v1"
      max_token_limit: 131072
      # api_key: "EMPTY"    # open endpoint; a placeholder is applied automatically

# ── Persistence ───────────────────────────────────────────────────────────────
mongodb_uri: mongodb://localhost:27017
mongodb_db: agent_memory
# Redis hot blackboard mirror (optional; remove to disable).
redis_url: redis://localhost:6379/0
# Milvus semantic long-term memory (optional). Local Milvus Lite file — no server
# needed. For a remote server set milvus_uri to an http URL instead (do NOT put a
# file path in milvus_uri; pymilvus reserves that for http endpoints).
milvus_db_path: ./milvus_store.db
# milvus_uri: http://localhost:19530
milvus_collection: long_term_memory
# Optional relational backends (off unless a DSN is set). Connection strings are
# read here by genie.platform.postgres / genie.platform.sqlserver. Prefer setting
# the real values in config/local.yaml. Env fallbacks: POSTGRES_DSN / SQLSERVER_DSN.
# postgres_dsn: postgresql://user:pass@localhost:5432/genie
# sqlserver_dsn: "DRIVER={ODBC Driver 18 for SQL Server};SERVER=localhost,1433;DATABASE=genie;UID=sa;PWD=changeme;TrustServerCertificate=yes"
openai_embed_model: text-embedding-3-small
openai_embed_dim: 1536

# ── Registry / discovery ──────────────────────────────────────────────────────
registry_url: http://127.0.0.1:8002
registry_port: 8002
registry_ttl_seconds: 90
registry_heartbeat_seconds: 30
registry_cache_ttl_s: 5.0
registry_timeout_s: 3.0
registry_serve_stale: true

# ── RAG service (standalone retrieval microservice) ───────────────────────────
# rag_backend selects how the platform retrieves: "local" (in-process BM25, the
# default — nothing to run) or "remote" (call the standalone RAG service below).
rag_backend: local
rag_service_url: http://127.0.0.1:8003
rag_service_port: 8003
rag_service_timeout_s: 3.0
# rag_service_auth_token: ""   # bearer token; blank = no auth (local dev)

# ── Agent service harness ─────────────────────────────────────────────────────
agent_host: 127.0.0.1
# Port resolution (highest first): AGENT_PORT env / agent_port here → the agent's
# own default in code (8010/8011/8012, for manual testing) → ephemeral port
# advertised via the registry. agent_port is intentionally NOT pinned here so each
# agent keeps its own default; uncomment to force ALL agents onto one port.
# agent_port: 8010
# agent_advertise_host: 127.0.0.1
# agent_advertise_port: 8010

# ── A2A protocol / Agent Card ─────────────────────────────────────────────────
# Advertised A2A protocol version. Left unset → the code default (PROTOCOL_VERSION,
# currently "1.2"). Pin here only to override without a code change.
# a2a_protocol_version: "1.2"
# Optional AgentProvider surfaced on every served Agent Card (/.well-known/agent-card.json).
# agent_provider_organization: OATI
# agent_provider_url: https://example.com

# ── Security guard (llm-guard) ────────────────────────────────────────────────
# Master switch. true (default): the guard runs and its local models load at
# startup (fail-closed). false: BOTH guard nodes are omitted from the graph and
# the llm-guard models are never loaded — the pipeline runs UNPROTECTED. The
# tuning flags below only apply when the guard is enabled.
llm_guard_enabled: false
# No personal data in this app → PII/secret NER scanners off (faster, less RAM).
llm_guard_pii: false
llm_guard_parallel: true
llm_guard_use_onnx: false
llm_guard_onnx_quantized: false
llm_guard_fail_open: false
# llm_guard_ban_topics: "violence, self-harm, hate speech, illegal weapons"

# ── Router triage tuning ──────────────────────────────────────────────────────
router_min_confidence: 0.7
# Multi-intent detection backend:
#   embedding — local sentence-transformers model (router_intent_model); the first
#               load downloads from HuggingFace, so it needs HF reachable or the
#               model pre-cached.
#   llm       — no local model: the Router's own LLM route call classifies intent
#               (multi-intent -> plan). Use where HuggingFace is unreachable. Set
#               here because our deployment boxes have no HuggingFace access.
router_intent_backend: llm
# Used only by the "embedding" backend:
router_intent_model: sentence-transformers/all-MiniLM-L6-v2
router_intent_threshold: 0.30
router_intent_min_agents: 2

# ── Planner ───────────────────────────────────────────────────────────────────
planner_max_facts: 40

# ── Observability ─────────────────────────────────────────────────────────────
mlflow_tracking_uri: http://127.0.0.1:5000
mlflow_experiment_name: genie-platform
# torch_num_threads: 4
