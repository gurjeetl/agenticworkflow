<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Assistant</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
    #root { width: 100%; max-width: 680px; height: 100vh; display: flex; flex-direction: column; }
    .chat-container { display: flex; flex-direction: column; height: 100vh; background: #fff; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
    .chat-header { background: #1a73e8; color: white; padding: 16px 20px; font-size: 18px; font-weight: 600; }
    .chat-header span { font-size: 13px; font-weight: 400; opacity: 0.85; display: block; margin-top: 2px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .bubble { max-width: 72%; padding: 10px 14px; border-radius: 18px; line-height: 1.5; font-size: 14px; word-break: break-word; }
    .bubble.user { white-space: pre-wrap; }
    .bubble.assistant p { margin: 0; }
    .bubble.assistant p + p { margin-top: 8px; }
    .bubble.assistant table { border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%; }
    .bubble.assistant th, .bubble.assistant td { border: 1px solid #dadce0; padding: 6px 10px; text-align: left; }
    .bubble.assistant th { background: #e8eaed; font-weight: 600; }
    .bubble.assistant tr:nth-child(even) td { background: #fafbfc; }
    .bubble.assistant code { background: #e8eaed; padding: 1px 5px; border-radius: 4px; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12.5px; }
    .bubble.assistant ul, .bubble.assistant ol { padding-left: 20px; margin: 4px 0; }
    .bubble.assistant.wide { max-width: 92%; }
    .view-title { font-weight: 600; margin-bottom: 6px; }
    .view-subtle { color: #5f6368; font-size: 12.5px; margin-bottom: 8px; }
    .view-section { margin-top: 12px; font-weight: 600; font-size: 13px; color: #3c4043; }
    .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge.yes { background: #fce8e6; color: #c5221f; }
    .badge.no { background: #e6f4ea; color: #137333; }
    details.view-summary { margin-top: 10px; }
    details.view-summary summary { cursor: pointer; font-weight: 600; font-size: 13px; color: #1a73e8; }
    details.view-summary .summary-body { margin-top: 8px; padding: 10px; background: #fff; border: 1px solid #dadce0; border-radius: 6px; }
    .bubble.user { background: #1a73e8; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .bubble.assistant { background: #f1f3f4; color: #202124; align-self: flex-start; border-bottom-left-radius: 4px; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; background: #f1f3f4; border-radius: 18px; border-bottom-left-radius: 4px; align-self: flex-start; }
    .typing span { width: 8px; height: 8px; background: #9aa0a6; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    .input-area { display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid #e8eaed; background: #fff; }
    .input-area input { flex: 1; padding: 10px 16px; border: 1px solid #dadce0; border-radius: 24px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .input-area input:focus { border-color: #1a73e8; }
    .input-area input:disabled { background: #f8f9fa; }
    .input-area button { background: #1a73e8; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .input-area button:hover:not(:disabled) { background: #1557b0; }
    .input-area button:disabled { background: #dadce0; cursor: not-allowed; }
    .debug-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; margin-top: 4px; transition: background 0.2s; }
    .debug-btn:hover { background: rgba(255,255,255,0.35); }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #1e1e1e; color: #d4d4d4; border-radius: 10px; width: 90%; max-width: 660px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #333; font-size: 13px; font-weight: 600; color: #9cdcfe; }
    .modal-close { background: none; border: none; color: #9aa0a6; font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; }
    .modal-close:hover { background: #333; color: white; }
    .modal-body { overflow-y: auto; padding: 16px; }
    .modal-body pre { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .json-key { color: #9cdcfe; }
    .json-str { color: #ce9178; }
    .json-num { color: #b5cea8; }
    .json-bool { color: #569cd6; }
    .json-null { color: #569cd6; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const threadId = crypto.randomUUID();
    console.log("threadId:", threadId);

    function highlight(json) {
      return json
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
          if (/^"/.test(match)) {
            return /:$/.test(match)
              ? `<span class="json-key">${match}</span>`
              : `<span class="json-str">${match}</span>`;
          }
          if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
          if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
          return `<span class="json-num">${match}</span>`;
        });
    }

    function YesNo({ value }) {
      const cls = value ? "yes" : "no";
      return <span className={`badge ${cls}`}>{value ? "Yes" : "No"}</span>;
    }

    function OutageListView({ data }) {
      const { items = [], total } = data;
      if (!items.length) return <div>No outages found.</div>;
      return (
        <div>
          <div className="view-title">Top {items.length} outages</div>
          <div className="view-subtle">of {total} total</div>
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Description</th><th>Type</th>
                <th>Participant</th><th>Status</th><th>Significant</th>
              </tr>
            </thead>
            <tbody>
              {items.map(it => (
                <tr key={it.id}>
                  <td>{it.id}</td>
                  <td>{it.short_description || "—"}</td>
                  <td>{it.outage_type || "—"}</td>
                  <td>{it.participant || "—"}</td>
                  <td>{it.status || "—"}</td>
                  <td><YesNo value={!!it.is_significant} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function OutageDetailView({ data }) {
      const { outage_id, metadata = {}, analysis = {} } = data;
      const pd = metadata.planned_duration || {};
      const equipments = metadata.impacted_equipments || [];
      const attrs = analysis.attributewise_inconsistencies || [];
      const summary = analysis.summary;

      return (
        <div>
          <div className="view-title">
            Outage {outage_id} — {metadata.short_description || "(no description)"}
          </div>
          <table>
            <tbody>
              <tr><th>Type</th><td>{metadata.outage_type || "—"}</td></tr>
              <tr><th>Participant</th><td>{metadata.participant || "—"}</td></tr>
              <tr><th>Status</th><td>{metadata.status || "—"}</td></tr>
              <tr><th>Nature of work</th><td>{metadata.nature_of_work || "—"}</td></tr>
              <tr><th>Planned start</th><td>{pd.start || "—"}</td></tr>
              <tr><th>Planned stop</th><td>{pd.stop || "—"}</td></tr>
              <tr><th>Total inconsistencies</th><td>{analysis.total_outage_inconsistencies ?? 0}</td></tr>
              <tr><th>Significant</th><td><YesNo value={!!analysis.is_significant} /></td></tr>
            </tbody>
          </table>

          {equipments.length > 0 && (
            <>
              <div className="view-section">Impacted equipment</div>
              <table>
                <thead>
                  <tr><th>Equipment</th><th>Station</th><th>Voltage (kV)</th></tr>
                </thead>
                <tbody>
                  {equipments.map((eq, i) => (
                    <tr key={i}>
                      <td>{eq.equipment_name || "—"}</td>
                      <td>{eq.station_name || "—"}</td>
                      <td>{eq.voltage_level || "—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </>
          )}

          {attrs.length > 0 && (
            <>
              <div className="view-section">Attribute findings</div>
              <table>
                <thead>
                  <tr><th>Attribute</th><th>Inconsistent</th></tr>
                </thead>
                <tbody>
                  {attrs.map((a, i) => (
                    <tr key={i}>
                      <td>{a.attribute || "—"}</td>
                      <td><YesNo value={!!a.is_inconsistent} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </>
          )}

          {summary && (
            <details className="view-summary">
              <summary>Show full summary</summary>
              <div
                className="summary-body"
                dangerouslySetInnerHTML={{ __html: marked.parse(summary, { breaks: true, gfm: true }) }}
              />
            </details>
          )}
        </div>
      );
    }

    function renderView(view) {
      if (!view) return null;
      if (view.type === "outage_list") return <OutageListView data={view} />;
      if (view.type === "outage_detail") return <OutageDetailView data={view} />;
      return null;
    }

    function StateModal({ data, onClose }) {
      const pretty = JSON.stringify(data, null, 2);
      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <span>Graph State — thread: {threadId.slice(0, 8)}…</span>
              <button className="modal-close" onClick={onClose}>&#x2715;</button>
            </div>
            <div className="modal-body">
              <pre dangerouslySetInnerHTML={{ __html: highlight(pretty) }} />
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [messages, setMessages] = useState([
        { role: "assistant", content: "Hi! I can help with **weather** for London, Paris, New York, Tokyo, or Dubai, or with the **top grid outages** from the latest report. What would you like?" }
      ]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [stateData, setStateData] = useState(null);
      const bottomRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      const showState = async () => {
        try {
          const res = await fetch(`/state/${threadId}`);
          const data = await res.json();
          setStateData(data);
        } catch {
          setStateData({ error: "Could not fetch state from server." });
        }
      };

      const send = async () => {
        const text = input.trim();
        if (!text || loading) return;
        setInput("");
        setMessages(prev => [...prev, { role: "user", content: text }]);
        setLoading(true);
        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, thread_id: threadId }),
          });
          const data = await res.json();
          setMessages(prev => [...prev, { role: "assistant", content: data.response, view: data.view }]);
        } catch {
          setMessages(prev => [...prev, { role: "assistant", content: "Sorry, I couldn't reach the server. Please try again." }]);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="chat-container">
          {stateData && <StateModal data={stateData} onClose={() => setStateData(null)} />}
          <div className="chat-header">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                Grid Assistant
                <span>Weather + outage reports · powered by LangGraph</span>
              </div>
              <div style={{display:'flex',gap:6}}>
                <a className="debug-btn" href="/trace.html" style={{textDecoration:'none',display:'inline-flex',alignItems:'center'}}>Tracer</a>
                <button className="debug-btn" onClick={showState}>Debug State</button>
              </div>
            </div>
          </div>
          <div className="messages">
            {messages.map((m, i) => {
              if (m.role === "user") {
                return <div key={i} className="bubble user">{m.content}</div>;
              }
              if (m.view) {
                return (
                  <div key={i} className="bubble assistant wide">
                    {renderView(m.view)}
                  </div>
                );
              }
              const html = marked.parse(m.content || "", { breaks: true, gfm: true });
              const wide = /<table/i.test(html);
              return (
                <div
                  key={i}
                  className={`bubble assistant${wide ? " wide" : ""}`}
                  dangerouslySetInnerHTML={{ __html: html }}
                />
              );
            })}
            {loading && (
              <div className="typing">
                <span /><span /><span />
              </div>
            )}
            <div ref={bottomRef} />
          </div>
          <div className="input-area">
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && send()}
              placeholder="Ask about weather or outages..."
              disabled={loading}
              autoFocus
            />
            <button onClick={send} disabled={loading}>&#9658;</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
